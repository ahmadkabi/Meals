workflows:
  ios-project-debug:
    name: "iOS debug"

    environment:
      xcode: latest
      cocoapods: default

      vars:
        XCODE_PROJECT: "Meals.xcodeproj"
        XCODE_SCHEME: "Meals"

    scripts:
      - name: Run tests
        script: |
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator'
            clean build test \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

      - name: Build debug app
        script: |
          xcodebuild build \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

    artifacts:
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app

    publishing:
      email:
        recipients:
          - ahmadkabi.dev@gmail.com
